name: Upload Logs

on:
  push:
    branches:
      - upload-logs

jobs:
  upload:
    runs-on: self-hosted
    steps:
      - name: Copy logs to workspace
        run: |
          mkdir -p logs
          cp /root/.pm2/logs/mono-old-main-error.log logs/error.log || true
          cp /root/.pm2/logs/mono-old-main-out.log logs/out.log || true
          pm2 status > logs/pm2_status.txt || true
          cat /root/mono/web/build_debug.log > logs/build_debug.txt || true
          cat /root/mono-old/web/build_debug.log > logs/old_build_debug.txt || true
      - name: Upload Logs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: logs/
