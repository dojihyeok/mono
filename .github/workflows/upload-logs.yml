name: Upload Logs

on:
  push:
    branches:
      - upload-logs

jobs:
  upload:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: upload-logs
      - name: Copy logs to workspace
        run: |
          mkdir -p logs
          cp /root/.pm2/logs/mono-old-main-error.log logs/error.log || true
          cp /root/.pm2/logs/mono-old-main-out.log logs/out.log || true
          pm2 status > logs/pm2_status.txt || true
          git config --global user.name "Github Actions"
          git config --global user.email "actions@github.com"
          git add logs/
          git commit -m "Upload logs" || true
          git push origin upload-logs
