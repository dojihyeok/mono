name: Deploy Mono to Production

on:
  push:
    branches:
      - main
      - migrate

jobs:
  deploy:
    name: 🚀 Deploy to Server
    runs-on: self-hosted
    env:
      PM2_HOME: "/root/.pm2"

    steps:
      - name: 📥 Pull latest code to /root/mono
        run: |
          cd /root/mono
          git fetch origin ${{ github.ref_name }}
          git reset --hard FETCH_HEAD
          git clean -fd

      # ============================== MIGRATE BRANCH WORKFLOW ==============================
      - name: ⚙ Run Server Migration (migrate branch only)
        if: github.ref_name == 'migrate'
        run: |
          cd /root/mono
          echo "=== Nginx sites-enabled files ==="
          ls -la /etc/nginx/sites-enabled/ || true
          for f in /etc/nginx/sites-enabled/*; do
            if [ -f "$f" ]; then
              echo "--- File: $f ---"
              cat "$f" || true
            fi
          done
          chmod +x scripts/server_migration.sh
          ./scripts/server_migration.sh > migration_output.log 2>&1 || {
            echo "Migration failed! Printing log..."
            cat migration_output.log
            git config --global user.name "Github Runner"
            git config --global user.email "runner@dojiung.com"
            git add migration_output.log
            git commit -m "chore(debug): add migration failure logs" || true
            git push origin migrate || true
            exit 1
          }

      # ============================== MAIN BRANCH WORKFLOW ==============================
      - name: 🛠 Ensure Docker and Docker Compose are installed
        if: github.ref_name == 'main'
        run: |
          echo "=== Checking Docker installation ==="
          if ! command -v docker &> /dev/null; then
            echo "Docker not found. Installing Docker..."
            sudo apt-get update
            sudo apt-get install -y docker.io
          else
            echo "Docker is already installed."
          fi
          
          if ! docker compose version &> /dev/null; then
            echo "Docker Compose plugin not found. Installing docker-compose-v2..."
            sudo apt-get install -y docker-compose-v2 || sudo apt-get install -y docker-compose
          else
            echo "Docker Compose is already installed."
          fi
          
          echo "=== Starting Docker Service ==="
          sudo systemctl start docker || sudo service docker start || true
          sudo systemctl enable docker || true

      - name: 🐋 Run Docker Compose for backend (main branch only)
        if: github.ref_name == 'main'
        run: |
          cd /root/mono
          if [ ! -f ".env" ]; then
            cp .env.example .env
          fi
          docker compose up -d --build
          docker compose exec -T api ./node_modules/.bin/prisma migrate deploy

      - name: 📦 Install frontend dependencies (main branch only)
        if: github.ref_name == 'main'
        run: |
          cd /root/mono/web
          npm ci

      - name: 🔨 Build Next.js frontend (main branch only)
        if: github.ref_name == 'main'
        env:
          DATABASE_URL: "postgresql://mono:mono_dev_pw@localhost:5433/mono?schema=public"
        run: |
          cd /root/mono/web
          rm -rf .next
          echo "=== Frontend Prisma Generate ===" > build_debug.log
          npx prisma generate >> build_debug.log 2>&1 || { cat build_debug.log; exit 7; }
          echo "=== Frontend Next.js Build ===" >> build_debug.log
          npm run build >> build_debug.log 2>&1 || { cat build_debug.log; exit 7; }

      - name: 🔄 Restart PM2 for new frontend (main branch only, Port 3004 Only)
        if: github.ref_name == 'main'
        run: |
          echo "=== Deleting all legacy PM2 instances ==="
          pm2 delete mono || true
          pm2 delete mono-new || true
          pm2 delete mono-strategy || true
          pm2 delete mono-old-main || true
          sleep 5
          
          echo "=== Force killing all processes on ports 3004, 3006, 3007 ==="
          PORT_PIDS=$(sudo lsof -t -i:3004 -i:3006 -i:3007)
          if [ ! -z "$PORT_PIDS" ]; then
            echo "Killing remaining processes: $PORT_PIDS"
            sudo kill -9 $PORT_PIDS || true
            sleep 2
          fi
          sudo fuser -k 3004/tcp || true
          sudo fuser -k 3006/tcp || true
          sudo fuser -k 3007/tcp || true
          sleep 1
          
          API_URL="http://localhost:8001" pm2 start node_modules/next/dist/bin/next --name "mono" --cwd /root/mono/web -- start -p 3004
          pm2 save
          pm2 list

      - name: 🌐 Update Nginx configuration and reload (main branch only)
        if: github.ref_name == 'main'
        run: |
          echo "=== Updating Nginx config from unified_services_final_new ==="
          if [ -f "/root/mono/unified_services_final_new" ]; then
            if [ -f "/etc/nginx/sites-enabled/default" ]; then
              echo "Removing Nginx default sites-enabled config to avoid conflicts..."
              sudo rm -f /etc/nginx/sites-enabled/default
            fi
            sudo cp /root/mono/unified_services_final_new /etc/nginx/sites-available/unified_services_final
            sudo ln -sf /etc/nginx/sites-available/unified_services_final /etc/nginx/sites-enabled/unified_services_final
            sudo nginx -t
            sudo systemctl reload nginx || sudo service nginx reload
            echo "✔ Nginx configuration successfully updated and reloaded."
          else
            echo "❌ Error: unified_services_final_new config file not found!"
            exit 1
          fi

      # ============================== DIAGNOSTICS & HEALTH CHECK ==============================
      - name: 🔍 Diagnostics
        run: |
          echo "=== PM2 LIST ==="
          pm2 list || true
          echo "=== PM2 SHOW DETAILS ==="
          pm2 show mono-new || true
          pm2 show mono-strategy || true
          pm2 show mono-old-main || true
          echo "=== PM2 MONO-STRATEGY ERROR LOG ==="
          cat /root/.pm2/logs/mono-strategy-error.log | tail -n 100 || true
          echo "=== PM2 MONO-OLD-MAIN ERROR LOG ==="
          cat /root/.pm2/logs/mono-old-main-error.log | tail -n 100 || true
          echo "=== SS PORT LIST ==="
          sudo ss -tulpn | grep -E "3004|3005|3006|3007|8000|8001|5433" || true
          echo "=== ALL NODE PROCESSES ==="
          ps aux | grep node || true
          echo "=== LISTENING PORTS ==="
          sudo lsof -i -P -n | grep LISTEN || true
          echo "=== NGINX CONFIG ==="
          sudo cat /etc/nginx/sites-enabled/* || true
          echo "=== BUILD LOG ==="
          cat /root/mono/web/build_debug.log || cat /root/mono/build_debug.log || true

      - name: ✅ Health Check
        run: |
          sleep 5
          if [ "${{ github.ref_name }}" = "migrate" ]; then
            echo "Checking port 3004 (strategy) and 3007 (old.mono)..."
            curl -f http://localhost:3004/strategy || (echo "Strategy page health check failed!" && exit 1)
            curl -f http://localhost:3007 || (echo "Old main page health check failed!" && exit 1)
          else
            echo "Checking port 3004 (new mono) and port 8001 (api)..."
            curl -f http://localhost:3004/strategy || (echo "Mono strategy page health check failed!" && exit 1)
            curl -f http://localhost:8001/health || (echo "NestJS API health check failed!" && exit 1)
          fi
