name: Deploy Mono to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Server
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout latest code
        uses: actions/checkout@v4

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Next.js
        run: npm run build

      - name: 🔄 Reload PM2 (Zero-Downtime)
        run: |
          if pm2 describe mono > /dev/null 2>&1; then
            pm2 reload mono --update-env
          else
            pm2 start npm --name "mono" -- run start -- -p 3004
          fi
          pm2 save

      - name: ✅ Health Check
        run: |
          sleep 5
          curl -f http://localhost:3004 || (echo "Health check failed!" && exit 1)
