name: Deploy Mono to Production

on:
  push:
    branches:
      - main
      - migrate

jobs:
  deploy:
    name: 🚀 Deploy to Server
    runs-on: self-hosted
    env:
      PM2_HOME: "/root/.pm2"

    steps:
      - name: 📥 Pull latest code to /root/mono
        run: |
          cd /root/mono
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          git clean -fd

      # ============================== MIGRATE BRANCH WORKFLOW ==============================
      - name: ⚙ Run Server Migration (migrate branch only)
        if: github.ref_name == 'migrate'
        run: |
          cd /root/mono
          chmod +x scripts/server_migration.sh
          ./scripts/server_migration.sh

      # ============================== MAIN BRANCH WORKFLOW ==============================
      - name: 🐋 Run Docker Compose for backend (main branch only)
        if: github.ref_name == 'main'
        run: |
          cd /root/mono
          if [ ! -f ".env" ]; then
            cp .env.example .env
          fi
          docker compose up -d --build
          docker compose exec -T api ./node_modules/.bin/prisma migrate deploy

      - name: 📦 Install frontend dependencies (main branch only)
        if: github.ref_name == 'main'
        run: |
          cd /root/mono/web
          npm ci

      - name: 🔨 Build Next.js frontend (main branch only)
        if: github.ref_name == 'main'
        env:
          DATABASE_URL: "postgresql://mono:mono_dev_pw@localhost:5432/mono?schema=public"
        run: |
          cd /root/mono/web
          rm -rf .next
          echo "=== Frontend Prisma Generate ===" > build_debug.log
          npx prisma generate >> build_debug.log 2>&1 || { cat build_debug.log; exit 7; }
          echo "=== Frontend Next.js Build ===" >> build_debug.log
          npm run build >> build_debug.log 2>&1 || { cat build_debug.log; exit 7; }

      - name: 🔄 Restart PM2 for new frontend (main branch only, Port 3006 Only)
        if: github.ref_name == 'main'
        run: |
          pm2 delete mono-new || true
          sleep 5
          PORT_PIDS=$(sudo lsof -t -i:3006)
          if [ ! -z "$PORT_PIDS" ]; then
            echo "Killing remaining processes on port 3006: $PORT_PIDS"
            sudo kill -9 $PORT_PIDS || true
            sleep 2
          fi
          sudo fuser -k 3006/tcp || true
          sleep 1
          
          pm2 start node_modules/next/dist/bin/next --name "mono-new" --cwd /root/mono/web -- start -p 3006
          pm2 save
          pm2 list

      # ============================== DIAGNOSTICS & HEALTH CHECK ==============================
      - name: 🔍 Diagnostics
        run: |
          echo "=== PM2 LIST ==="
          pm2 list || true
          echo "=== PM2 SHOW DETAILS ==="
          pm2 show mono-new || true
          pm2 show mono-strategy || true
          pm2 show mono-old-main || true
          echo "=== SS PORT LIST ==="
          sudo ss -tulpn | grep -E "3004|3005|3006|8000" || true
          echo "=== ALL NODE PROCESSES ==="
          ps aux | grep node || true
          echo "=== LISTENING PORTS ==="
          sudo lsof -i -P -n | grep LISTEN || true
          echo "=== NGINX CONFIG ==="
          sudo cat /etc/nginx/sites-enabled/* || true
          echo "=== BUILD LOG ==="
          cat /root/mono/web/build_debug.log || cat /root/mono/build_debug.log || true

      - name: ✅ Health Check
        run: |
          sleep 5
          if [ "${{ github.ref_name }}" = "migrate" ]; then
            echo "Checking port 3004 (strategy) and 3005 (old.mono)..."
            curl -f http://localhost:3004 || (echo "Strategy page health check failed!" && exit 1)
            curl -f http://localhost:3005 || (echo "Old main page health check failed!" && exit 1)
          else
            echo "Checking port 3006 (new mono)..."
            curl -f http://localhost:3006 || (echo "New main page health check failed!" && exit 1)
          fi
