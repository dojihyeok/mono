name: Deploy Mono to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Server
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout latest code
        uses: actions/checkout@v4

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Next.js
        run: |
          rm -rf .next
          npm run build

      - name: 🔄 Restart PM2 (Sudo Cleanup & Hard Restart)
        run: |
          echo "🧹 Performing Sudo Cleanup of all zombie processes..."
          # 타겟 포트(3004) 및 일반적인 포트(3000-3005)를 점유한 모든 프로세스 강제 종료
          sudo fuser -k 3004/tcp || true
          sudo fuser -k 3000/tcp || true
          
          # 모든 구형 PM2 프로세스 삭제
          sudo pm2 delete all || pm2 delete all || true
          
          echo "🚀 Starting fresh production build on port 3004..."
          # 새 프로세스 시작
          PORT=3004 pm2 start npm --name "mono" --cwd . -- run start -- -p 3004
          
          pm2 save
          pm2 list
          
          echo "✅ Final Port Scan:"
          sudo netstat -tulpn | grep LISTEN || true

      - name: ✅ Health Check
        run: |
          sleep 5
          curl -f http://localhost:3004 || (echo "Health check failed!" && exit 1)
