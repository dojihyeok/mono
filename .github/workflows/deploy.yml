name: Deploy Mono to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Server
    runs-on: self-hosted

    steps:
      - name: 📥 Pull latest code to /root/mono
        run: |
          cd /root/mono
          git pull origin main

      - name: 📦 Install dependencies
        run: |
          cd /root/mono
          npm ci

      - name: 🔨 Build Next.js
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          cd /root/mono
          rm -rf .next
          npm run build

      - name: 🔄 Restart PM2 (Port 3004 Only)
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          # 3004 포트를 사용 중인 프로세스만 종료
          sudo fuser -k 3004/tcp || true
          
          # mono 프로세스만 삭제 후 재시작
          pm2 delete mono || true
          PORT=3004 pm2 start npm --name "mono" --cwd /root/mono -- run start -- -p 3004
          
          pm2 save
          pm2 list

      - name: ✅ Health Check
        run: |
          sleep 5
          curl -f http://localhost:3004 || (echo "Health check failed!" && exit 1)
