name: Deploy Mono to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Server
    runs-on: self-hosted

    steps:
      - name: 📥 Pull latest code to /root/mono
        run: |
          cd /root/mono
          git fetch origin main
          git reset --hard origin/main
          git clean -fd

      - name: 📦 Install dependencies
        run: |
          cd /root/mono
          npm ci

      - name: 🔨 Build Next.js
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          cd /root/mono
          rm -rf .next
          echo "=== Prisma Generate ===" > build_debug.log
          npx prisma generate >> build_debug.log 2>&1 || { cat build_debug.log; exit 7; }
          echo "=== Next.js Build ===" >> build_debug.log
          npm run build >> build_debug.log 2>&1 || { cat build_debug.log; exit 7; }

      - name: 🔄 Restart PM2 (Port 3006 Only)
        env:
          DATABASE_URL: "file:./prisma/dev.db"
        run: |
          # 1. PM2에서 기존 프로세스 삭제 (비동기 종료 시작)
          pm2 delete mono-new || true
          
          # 2. 프로세스가 완전히 종료되고 소켓이 반환되도록 대기
          sleep 5
          
          # 3. 혹시 남아있을 수 있는 고아 프로세스 및 3006 포트 강제 클리어
          PORT_PIDS=$(sudo lsof -t -i:3006)
          if [ ! -z "$PORT_PIDS" ]; then
            echo "Killing remaining processes on port 3006: $PORT_PIDS"
            sudo kill -9 $PORT_PIDS || true
            sleep 2
          fi
          sudo fuser -k 3006/tcp || true
          sleep 1
          
          # 4. 깨끗해진 포트 3006에 새 Next.js 서버 기동
          pm2 start node_modules/next/dist/bin/next --name "mono-new" --cwd /root/mono -- start -p 3006
          
          pm2 save
          pm2 list

      - name: 🔍 Diagnostics
        run: |
          echo "=== PM2 LIST ==="
          pm2 list || true
          echo "=== PM2 SHOW MONO-NEW ==="
          pm2 show mono-new || true
          echo "=== PM2 ERROR LOG ==="
          sudo cat /etc/.pm2/logs/mono-new-error.log || true
          echo "=== PM2 OUT LOG ==="
          sudo cat /etc/.pm2/logs/mono-new-out.log || true
          echo "=== LISTENING PORTS ==="
          sudo lsof -i -P -n | grep LISTEN || true
          echo "=== NGINX CONFIG ==="
          sudo cat /etc/nginx/sites-enabled/* || true
          echo "=== BUILD LOG ==="
          cat /root/mono/build_debug.log || true
          echo "=== LOCALHOST 3006 HEADERS ==="
          curl -sI http://localhost:3006 || true

      - name: ✅ Health Check
        run: |
          sleep 5
          curl -f http://localhost:3006 || (echo "Health check failed!" && exit 1)
