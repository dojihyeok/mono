name: Deploy Mono to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Server
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout latest code
        uses: actions/checkout@v4

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Next.js
        run: |
          rm -rf .next
          npm run build

      - name: 🔄 Restart PM2 (Surgical Restart - Port 3004 Only)
        run: |
          echo "🎯 Targeting only Port 3004..."
          
          # 3004 포트를 사용 중인 구형 프로세스만 선택적으로 종료
          sudo fuser -k 3004/tcp || true
          
          # 해당 이름의 PM2 프로세스만 삭제
          pm2 delete mono || true
          
          echo "🚀 Restarting Mono on Port 3004..."
          # 3004 포트로 고정하여 시작
          PORT=3004 pm2 start npm --name "mono" --cwd . -- run start -- -p 3004
          
          pm2 save
          pm2 list
          
          echo "✅ Final Port Scan:"
          sudo netstat -tulpn | grep LISTEN || true

      - name: ✅ Health Check
        run: |
          sleep 5
          curl -f http://localhost:3004 || (echo "Health check failed!" && exit 1)
