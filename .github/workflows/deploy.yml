name: Deploy Mono to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to Server
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout latest code
        uses: actions/checkout@v4

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build Next.js
        run: npm run build

      - name: 🔄 Restart PM2 (Hard Restart)
        run: |
          echo "🚀 Starting Deployment Pulse..."
          # Delete existing process if any, ignore errors
          pm2 delete mono || true
          pm2 delete mono-server || true
          
          # Start fresh from the correct directory
          pm2 start npm --name "mono" --cwd . -- run start -- -p 3004
          
          # Finalize
          pm2 save
          pm2 list

      - name: ✅ Health Check
        run: |
          sleep 5
          curl -f http://localhost:3004 || (echo "Health check failed!" && exit 1)
