name: CI - Build Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: 🔍 Verify Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            api/package-lock.json

      - name: 📦 Install & Build Backend API
        env:
          DATABASE_URL: "postgresql://mono:mono_dev_pw@localhost:5432/mono?schema=public"
        run: |
          cd api
          npm ci
          npx prisma generate
          npm run build

      - name: 📦 Install & Build Frontend Web
        env:
          DATABASE_URL: "postgresql://mono:mono_dev_pw@localhost:5432/mono?schema=public"
        run: |
          cd web
          npm ci
          npx prisma generate
          npm run build
